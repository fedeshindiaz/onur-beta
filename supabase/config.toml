project_id = "onur-beta"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://onur-beta-clinica.fedeshin.chatgpt.site"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "https://onur-beta-clinica.fedeshin.chatgpt.site/restablecer-clave",
  "https://fedeshindiaz.github.io/onur-beta/restablecer-clave",
]
enable_signup = false

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[storage]
enabled = true
file_size_limit = "25MiB"

[storage.vector]
enabled = false

[functions.patient-login]
verify_jwt = false
